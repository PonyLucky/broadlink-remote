<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Broadlink Controller</title>
  <link rel="icon" href="/static/images/favicon.png" />
  <link rel="stylesheet" href="/static/styles/index.css" />
</head>
<body class="theme-white">
  <header>
    <h1>Broadlink Controller</h1>
    <div class="header-controls">
      <div class="segmented" role="group" aria-label="Theme selector">
        <button type="button" id="themeLightBtn" class="seg-btn" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="white"><path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z"/></svg>
        </button>
        <span class="sep">/</span>
        <button type="button" id="themeDarkBtn" class="seg-btn active" aria-pressed="true">
          <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="white"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg>
        </button>
        <span class="sep">/</span>
        <button type="button" id="themeContrastBtn" class="seg-btn" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="white"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm40-83q119-15 199.5-104.5T800-480q0-123-80.5-212.5T520-797v634Z"/></svg>
        </button>
      </div>
      <div class="segmented" role="group" aria-label="View selector">
        <button type="button" id="viewFancyBtn" class="seg-btn" aria-pressed="false">fancy</button>
        <span class="sep">/</span>
        <button type="button" id="viewListBtn" class="seg-btn active" aria-pressed="true">list</button>
      </div>
      <button type="button" id="filtersBtn" class="filters-btn">Filters</button>
    </div>
  </header>
  <main>
    <section class="panel" id="scriptsPanel">
      <h2>Scripts</h2>
      <div id="scripts" class="scripts-list"></div>
    </section>
    <section class="panel" id="commandsPanel">
        <div id="commands"></div>
    </section>
    <section class="panel" id="commandsView" hidden>
        <div id="viewContainer" class="fancy-container"></div>
    </section>
  </main>

  <!-- Filters Modal -->
  <div id="filtersOverlay" class="modal-overlay" hidden></div>
  <div id="filtersModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="filtersTitle" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="filtersTitle">Filters</h2>
        <button type="button" id="filtersClose" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="controller">Controller</label>
          <select id="controller"></select>
        </div>
        <div class="field">
          <label>Devices</label>
          <div class="multi-dropdown" id="devicesDropdown">
            <button type="button" id="devicesTrigger" class="dropdown-trigger">All devices</button>
            <div class="dropdown-menu" id="devicesMenu" hidden>
              <div class="menu-header"><label class="checkbox"><input type="checkbox" id="devicesSelectAll" checked /> Select all</label></div>
              <div class="menu-list" id="devicesList"></div>
            </div>
          </div>
        </div>
        <label class="checkbox"><input type="checkbox" id="showDisabled" /> Show disabled</label>
      </div>
      <div class="modal-footer">
        <button type="button" id="filtersApply" class="primary">Apply</button>
      </div>
    </div>
  </div>

  <!-- Script Details Modal -->
  <div id="scriptOverlay" class="modal-overlay" hidden></div>
  <div id="scriptModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="scriptTitle" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="scriptTitle">Script</h2>
        <button type="button" id="scriptClose" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="scriptBody"></div>
      <div class="modal-footer">
        <button type="button" id="scriptRunBtn" class="primary">Run</button>
      </div>
    </div>
  </div>

  <script src="/static/scripts/index.js"></script>
</body>
</html>

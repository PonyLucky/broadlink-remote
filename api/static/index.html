<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Broadlink Controller</title>
  <link rel="stylesheet" href="/static/styles/index.css" />
</head>
<body>
  <header>
    <h1>Broadlink Controller</h1>
    <a href="/api/doc/openapi.json" target="_blank">OpenAPI Docs ↗</a>
  </header>
  <main>
    <section class="panel">
      <div class="row">
        <label for="controller">Controller</label>
        <select id="controller"></select>
      </div>
      <div class="row">
        <label for="device">Device</label>
        <select id="device"></select>
      </div>
      <div class="row">
        <button id="refresh" class="primary">🔄 Refresh</button>
      </div>
      <div class="status" id="status"></div>
      <div class="tip">💡 Tip: Expand groups to view commands. Click <b>Send</b> to execute.</div>
    </section>

    <section class="panel" id="commandsPanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 class="muted" id="deviceTitle">Select a controller and device.</h3>
            <button id="toggleDisabled" style="width: auto; padding: 4px 8px; font-size: 12px;" class="primary">
                Show disabled
            </button>
        </div>
        <ul class="tree" id="commands"></ul>
    </section>
  </main>
  <script src="/static/scripts/index.js"></script>
</body>
</html>
